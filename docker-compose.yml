services:
  rendercv-mcp:
    build: .
    ports:
      - "8000:8000"   # MCP server (streamable-http)
      - "8001:8001"   # Artifact file download server
    volumes:
      - ./workspace:/workspace
    environment:
      RENDERCV_TRANSPORT: streamable-http
      RENDERCV_HTTP_HOST: 0.0.0.0
      RENDERCV_HTTP_PORT: "8000"
      RENDERCV_FILE_SERVER_PORT: "8001"
      RENDERCV_MAX_CONCURRENT_RENDERS: "4"
      RENDERCV_ARTIFACT_KEEP_JOBS: "100"
      # Set this to your server's public IP or domain so render results include
      # ready-to-use download links, e.g.:
      #   RENDERCV_PUBLIC_URL: "http://192.168.1.42:8001"
      #   RENDERCV_PUBLIC_URL: "https://rendercv.yourdomain.com"
      RENDERCV_PUBLIC_URL: "http://localhost:8001"
      # Uncomment to require auth on both endpoints:
      # RENDERCV_API_KEY: "change-me-before-deploying"
    restart: unless-stopped
