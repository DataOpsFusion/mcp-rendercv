# Deployment compose — lives on devops-server at:
#   /opt/rendercv-mcp/docker-compose.yml
#
# To update after a new image push:
#   docker compose pull && docker compose up -d

services:
  rendercv-mcp:
    image: docker-local.homeserverlocal.com/rendercv/rendercv-mcp:latest
    container_name: rendercv-mcp
    ports:
      - "8282:8000"   # MCP server (streamable-http)
      - "8283:8001"   # Artifact file download
    volumes:
      - ./workspace:/workspace
    environment:
      RENDERCV_TRANSPORT: streamable-http
      RENDERCV_HTTP_HOST: 0.0.0.0
      RENDERCV_HTTP_PORT: "8000"
      RENDERCV_FILE_SERVER_PORT: "8001"
      RENDERCV_MAX_CONCURRENT_RENDERS: "4"
      RENDERCV_ARTIFACT_KEEP_JOBS: "100"
      # LAN IP of devops-server — used to build download_url in render results.
      RENDERCV_PUBLIC_URL: "http://192.168.0.70:8283"
      RENDERCV_API_KEY: ${RENDERCV_API_KEY}
    restart: unless-stopped
